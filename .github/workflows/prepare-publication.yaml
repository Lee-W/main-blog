# Stamps a draft post with its real publication time at merge.
#
# Drafts carry `Status: draft` and a placeholder `Date`. When a PR with a
# `new post:` commit has auto-merge enabled, this workflow corrects the filename
# sequence, removes the draft status, and rewrites `Date` to "now"
# (Asia/Taipei), then commits the result back to the PR branch. Whether a PR
# qualifies is decided by
# scripts/prepare_publication.py from commit messages, not the PR title (which
# is freeform and can go stale, e.g. reused from an earlier `new draft:` PR).
# The metadata edit is done by that script's `prepare` mode; ci.yaml runs the
# same script in `check` mode as a PR gate.
#
# Security: pull_request_target runs with repository secrets, so the job `if`
# restricts it to same-repo branches, and the *automation* script is checked
# out from the trusted base commit (not the PR head) into a separate directory
# from the PR content it operates on.

name: Prepare publication

on:
  pull_request_target:
    # auto_merge_enabled is the primary trigger; synchronize/ready_for_review
    # re-run prepare when the branch changes after auto-merge is already on
    # (the job `if` ignores PRs without auto-merge).
    types:
      - auto_merge_enabled
      - ready_for_review
      - synchronize

permissions:
  contents: read

concurrency:
  group: prepare-publication-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  prepare:
    # Only act on same-repo PRs that already have auto-merge on. Whether the PR
    # actually publishes a post is decided by prepare_publication.py itself
    # (via commit message, not the freeform PR title) once checked out below.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.auto_merge != null
    runs-on: ubuntu-latest
    steps:
      - name: Require publication token
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          if [ -z "$PUBLISH_TOKEN" ]; then
            echo "PUBLISH_TOKEN is required to update the PR and retrigger CI."
            exit 1
          fi

      # The script we execute comes from the base commit (trusted), never from
      # the PR branch, so a malicious PR can't alter what runs with the token.
      - name: Check out trusted automation
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: automation
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}

      # The PR content lives in a separate directory; PUBLISH_TOKEN is a PAT so
      # the pushed metadata commit re-triggers required CI (the default
      # GITHUB_TOKEN would not). fetch-depth: 0 gives the base ref for diffing.
      - name: Check out pull request branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: pull-request
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.PUBLISH_TOKEN }}

      # Corrects the category/year filename sequence, removes Status: draft, and
      # rewrites Date for posts this PR changes vs the base.
      - name: Prepare publication metadata
        working-directory: pull-request
        run: >-
          python3 ../automation/scripts/prepare_publication.py prepare
          --base-ref origin/${{ github.event.pull_request.base.ref }}

      - name: Commit and push metadata
        working-directory: pull-request
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Loop-breaker: our marker push fires `synchronize`, which re-enters
          # this job. The script also treats this branch-tip marker as prepared.
          if git log -1 --pretty=%s | grep -q '^post metadata: prepare publication for #'; then
            echo "Branch already carries the automation publication commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts
          # The marker commit is the required-check handshake. Keep it even in
          # the unlikely case where Date already equals the current minute.
          git commit --allow-empty -m "post metadata: prepare publication for #${PR_NUMBER}"
          git push origin "HEAD:${HEAD_REF}"
