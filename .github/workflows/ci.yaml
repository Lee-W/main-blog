---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      git_rev:
        description: 'git revision'
        required: false
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          # Publishing checks inspect the actual PR branch tip for the
          # automation marker, not GitHub's synthetic pull-request merge commit.
          ref: '${{ github.event.pull_request.head.sha || inputs.git_rev }}'

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies
        run: |
          uv --version
          uv sync

      - name: Cache pre-commit hook environments
        uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Check publishing metadata
        # prepare_publication.py itself decides whether this is a publishing PR
        # by scanning commit messages for a `new post:` subject — the PR title
        # is freeform and can go stale (e.g. reused from an earlier `new draft:`
        # PR), so it isn't used as the signal.
        if: github.event_name == 'pull_request'
        run: >-
          uv run python scripts/prepare_publication.py check
          --base-ref origin/${{ github.base_ref }}

      - name: Run unit tests
        run: uv run pytest

      - name: Check Python coding style
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            uv run inv style --rev-range "${{ github.event.before }}..${{ github.sha }}"
          else
            uv run inv style
          fi

      - name: Check whether pelican local pages is buildable
        run: |
          uv run inv build

      - name: Check whether pelican public pages and search index are buildable
        run: |
          uv run inv build-publish

      - name: Check Python dependencies through pip-audit
        run: |
          uv run inv security-check
