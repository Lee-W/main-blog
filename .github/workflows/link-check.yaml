---
name: Dead link check

on:
  schedule:
    - cron: "0 2 1 * *"  # 每月 1 日 UTC 02:00 (台灣時間 10:00)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7.0.0

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            https://blog.wei-lee.me
          fail: true
          jobSummary: true

      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Dead links found (${{ github.run_started_at }})"
          content-filepath: ./lychee/out.md
          labels: |
            dead link
