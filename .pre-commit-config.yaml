repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.0.128
    hooks:
      - id: rumdl
        args: ["content", "--fix"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: Run codespell to check for common misspellings in files
        language: python
        files: "content/posts/|content/pages/"
        types: [text]
        args: ["--write-changes", "--ignore-words", "spelling_wordlist.txt"]

  - repo: https://github.com/adamchainz/blacken-docs
    rev: "1.19.1"
    hooks:
      - id: blacken-docs
        args: ["--line-length", "110"]
        additional_dependencies:
        - black==24.8.0

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.6
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: no-local-uv-source
        name: Ensure no local path in uv sources
        language: pygrep
        entry: '\{\s*path\s*='
        files: ^pyproject\.toml$

      - id: check-post-metadata
        name: Check post metadata style
        language: system
        entry: uv run python scripts/check_post_metadata.py
        args: ["--categories", "Tech,Random Thoughts,Book"]
        files: ^content/posts/.*\.md$

      - id: remove-gps-from-image-exif
        name: Remove GPS Info from image exif
        language: system
        pass_filenames: false
        entry: uv run inv check-and-remove-image-exif-gps-info
        # Gate on image files actually changing (an earlier version had no
        # `files:` filter at all, so it re-scanned all of content/images/ on
        # every commit, even ones that never touched an image -- that's why
        # it got commented out). Scoping to image-file changes keeps the
        # hook meaningful without the runtime tax on unrelated commits.
        files: (?i)^content/images/.*\.(jpe?g|png)$
